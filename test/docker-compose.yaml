version: '3.8'
services:
  tls:
    image: nginx:latest
    ports:
      - "127.0.0.1:7443:7443"
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certificates:/etc/ssl/

volumes:
  certificates:
    driver: local
    driver_opts:
      type: none
      device: "$PWD/certificates"
      o: bind
